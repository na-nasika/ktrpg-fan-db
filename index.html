<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コーサカTRPGまとめ [非公式]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'M PLUS 1p', 'Noto Sans JP', sans-serif;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #fff5f5; }
        ::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ec4899; }
        [x-cloak] { display: none !important; }
        
        /* 📸 html2canvas専用：二列スタジオ */
        #dynamic-capture-studio {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 780px; 
            box-sizing: border-box;
            background-color: #fff5f5;
            padding: 24px;
            border-radius: 24px;
        }
        .studio-grid {
            display: grid;
            grid-template-columns: 354px 354px; 
            gap: 24px;
            width: 100%;
        }
        .studio-grid .capture-hide {
            display: none !important; 
        }
        .studio-middle-cell {
            display: table-cell !important;
            vertical-align: middle !important;
            height: 64px; 
        }
        
        /* 💫 スクロール移動したターゲットをピカッと強調するエフェクト */
        .highlight-target {
            animation: pulse-highlight 1.5s ease-in-out;
        }
        @keyframes pulse-highlight {
            0% { background-color: rgba(244, 114, 182, 0); }
            30% { background-color: rgba(244, 114, 182, 0.3); transform: scale(1.02); }
            100% { background-color: rgba(244, 114, 182, 0); }
        }
    </style>
</head>
<body class="bg-pink-50/40 text-slate-800 antialiased selection:bg-pink-100 selection:text-pink-900">

    <div x-data="app()" x-init="initApp()" class="max-w-6xl mx-auto px-4 py-6 sm:py-8" x-cloak>
        
        <header class="mb-5 sm:mb-6 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3 pb-5 border-b border-pink-200">
            <div class="flex items-center gap-1">
                <span class="text-2xl inline-block transform rotate-[-12deg] select-none text-pink-500 w-8 text-center">🦇</span>
                <h1 class="text-xl sm:text-2xl font-black text-slate-900 tracking-wider">コーサカTRPGまとめ</h1>
                <span class="text-[10px] bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full font-bold border border-pink-200 tracking-wide ml-2">非公式</span>
            </div>
            
            <div class="text-xs text-slate-400 font-medium tracking-tight flex flex-wrap items-center gap-x-4 gap-y-1 sm:justify-end">
                <div>
                    該当セッション: <span x-text="filteredStreams().length" class="text-pink-600 font-black text-sm"></span> <span class="text-[11px] font-bold text-slate-400">件</span>
                </div>
                <div class="hidden sm:block text-pink-200">|</div>
                <div>
                    最終更新: <span x-text="formatDateOnly(updatedAt)" class="text-pink-600 font-bold"></span>
                </div>
            </div>
        </header>

        <div class="bg-white p-3 sm:p-4 rounded-2xl border border-pink-100 mb-6 space-y-3 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div>
                    <input type="text" x-model="searchQuery" placeholder="🔍 シナリオ、PL、PCなど..." class="w-full bg-pink-50/10 border border-pink-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-transparent transition-all">
                </div>

                <div class="md:col-span-2 flex flex-col sm:flex-row sm:items-center gap-2">
                    <div class="flex items-center w-full bg-pink-50/10 border border-pink-200 rounded-xl px-3 py-0.5">
                        <span class="text-[11px] font-bold text-pink-400 mr-2 whitespace-nowrap sm:hidden">開始</span>
                        <input type="date" x-model="startDate" class="w-full bg-transparent text-sm focus:outline-none py-1 text-slate-600 cursor-pointer">
                    </div>
                    <span class="text-pink-300 text-xs font-bold text-center hidden sm:inline">〜</span>
                    <div class="flex items-center w-full bg-pink-50/10 border border-pink-200 rounded-xl px-3 py-0.5">
                        <span class="text-[11px] font-bold text-pink-400 mr-2 whitespace-nowrap sm:hidden">終了</span>
                        <input type="date" x-model="endDate" class="w-full bg-transparent text-sm focus:outline-none py-1 text-slate-600 cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap items-center justify-between gap-3 pt-2.5 border-t border-pink-50 text-xs">
                <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                    <div class="inline-flex gap-1 bg-pink-50/60 p-1 rounded-xl border border-pink-100">
                        <button @click="toggleRole('gm')" :class="kosakaRole === 'gm' ? 'bg-pink-500 text-white font-bold shadow-sm' : 'text-slate-600 hover:bg-pink-100/50'" class="px-3 py-1 rounded-lg transition-all cursor-pointer">GM</button>
                        <button @click="toggleRole('pl')" :class="kosakaRole === 'pl' ? 'bg-pink-500 text-white font-bold shadow-sm' : 'text-slate-600 hover:bg-pink-100/50'" class="px-3 py-1 rounded-lg transition-all cursor-pointer">PL</button>
                    </div>

                    <div class="inline-flex gap-1 bg-pink-50/60 p-1 rounded-xl border border-pink-100">
                        <button @click="toggleStatus('watched')" :class="selectedStatus === 'watched' ? 'bg-pink-500 text-white font-bold shadow-sm' : 'text-slate-600 hover:bg-pink-100/50'" class="px-3 py-1 rounded-lg transition-all cursor-pointer">✅ 視聴済み</button>
                        <button @click="toggleStatus('unwatched')" :class="selectedStatus === 'unwatched' ? 'bg-pink-500 text-white font-bold shadow-sm' : 'text-slate-600 hover:bg-pink-100/50'" class="px-3 py-1 rounded-lg transition-all cursor-pointer">⬜ 未視聴</button>
                    </div>

                    <button @click="toggleFavoriteFilter()" :class="showFavoritesOnly ? 'bg-pink-500 text-white font-bold border-pink-500 shadow-sm' : 'border-pink-200 text-slate-600 hover:bg-pink-50/50'" class="border px-3 py-1 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer">
                        <span class="w-2 h-2 rounded-full transition-colors" :class="showFavoritesOnly ? 'bg-white' : 'bg-pink-300'"></span>
                        <span>お気に入り</span>
                    </button>
                </div>

                <div class="flex items-center gap-2 ml-auto sm:ml-0">
                    <template x-if="showFavoritesOnly && filteredStreams().length > 0">
                        <button @click="downloadAsImage()" class="bg-slate-800 hover:bg-slate-700 text-white font-medium px-3 py-1 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer shadow-sm">
                            <span>📸 画像で保存</span>
                        </button>
                    </template>

                    <button @click="toggleSortOrder()" class="border border-pink-200 hover:bg-pink-50/50 text-slate-600 font-medium px-3 py-1 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer">
                        <span x-text="sortOrder === 'desc' ? '📅 新しい順' : '📅 古い順'"></span>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-card-container" class="block md:hidden space-y-4">
            <template x-for="stream in filteredStreams()" :key="'card-'+stream.id">
                <div :id="'mobile-'+stream.id" @click="openModal(stream)" class="bg-white rounded-2xl border border-pink-100 p-4 shadow-sm space-y-3 transition-all duration-300 cursor-pointer relative" :class="isWatched(stream.id) ? 'bg-pink-50/10' : ''">
                    
                    <div class="flex items-center justify-between border-b border-pink-50 pb-2">
                        <div class="flex items-center gap-2">
                            <button @click.stop="toggleFavorite(stream.id)" class="p-1 -ml-1 focus:outline-none cursor-pointer" title="お気に入り">
                                <div class="w-2.5 h-2.5 rounded-full border transition-all duration-200" 
                                     :class="isFavorite(stream.id) ? 'bg-pink-400 border-pink-400' : 'bg-slate-100 border-slate-200 hover:bg-pink-100'"></div>
                            </button>
                            <span class="text-xs text-slate-400 font-medium" x-text="stream.date"></span>
                        </div>
                        <label class="capture-hide flex items-center gap-1.5 text-xs text-slate-500 cursor-pointer select-none" @click.stop>
                            <input type="checkbox" :checked="isWatched(stream.id)" @change="toggleWatched(stream.id)" class="w-4 h-4 rounded border-pink-300 text-pink-500 focus:ring-pink-400 cursor-pointer accent-pink-500">
                            <span class="text-[11px]" x-text="isWatched(stream.id) ? '視聴済み' : '未視聴'"></span>
                        </label>
                    </div>

                    <div class="flex gap-3 items-center">
                        <template x-if="getYoutubeId(stream.links)">
                            <div class="w-28 shrink-0 aspect-video h-[64px] bg-pink-50 rounded-lg overflow-hidden border border-pink-100/60 shadow-sm">
                                <img :src="'https://img.youtube.com/vi/' + getYoutubeId(stream.links) + '/mqdefault.jpg'" alt="Thumbnail" class="w-full h-full object-cover">
                            </div>
                        </template>
                        <template x-if="!getYoutubeId(stream.links)">
                            <div class="w-28 shrink-0 aspect-video h-[64px] bg-pink-50/50 rounded-lg flex items-center justify-center border border-pink-100/40">
                                <span class="text-[10px] text-pink-300 font-bold">NO IMAGE</span>
                            </div>
                        </template>
                        
                        <div class="studio-middle-cell flex-1 min-w-0" style="display: table-cell; vertical-align: middle;">
                            <div class="font-bold text-slate-900 tracking-wide text-xs sm:text-sm leading-snug break-words" x-text="stream.scenario"></div>
                            <div class="mt-0.5 leading-none">
                                <span class="inline-block bg-slate-100 text-slate-500 text-[9px] sm:text-[10px] px-1.5 py-0.5 rounded-md font-medium" x-text="stream.system"></span>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between gap-2 pt-1" @click.stop>
                        <div class="text-[11px] text-slate-500 truncate flex items-center pt-0.5 pb-1 leading-loose">
                            <span class="font-bold text-slate-400 mr-1 select-none">GM:</span> 
                            <span class="font-bold text-slate-700" x-text="stream.gm"></span>
                        </div>
                        <div class="capture-hide flex flex-col gap-1 w-24 shrink-0 text-center">
                            <template x-for="link in stream.links">
                                <a :href="link.url" target="_blank" class="inline-block w-full bg-pink-500 hover:bg-pink-600 text-white text-[10px] py-1 px-1.5 rounded-lg font-medium transition-colors shadow-sm" x-text="link.label"></a>
                            </template>
                            <template x-if="stream.hashtag">
                                <a :href="'https://x.com/search?q=' + encodeURIComponent('#' + stream.hashtag)" target="_blank" class="inline-block w-full bg-slate-700 hover:bg-slate-600 text-white text-[9px] py-0.5 px-1.5 rounded-lg font-normal transition-colors overflow-hidden text-ellipsis whitespace-nowrap" x-text="stream.hashtag"></a>
                            </template>
                        </div>
                    </div>

                    <div class="bg-pink-50/20 rounded-xl p-2.5 text-[11px] border border-pink-50/50 flex flex-wrap gap-1 mt-1 items-center">
                        <span class="text-slate-400 font-bold mr-1 shrink-0 select-none">PL:</span>
                        <div class="flex flex-wrap gap-1 flex-1 items-center">
                            <template x-for="char in stream.characters">
                                <span class="bg-white text-pink-700 text-[10px] font-medium px-1.5 py-1 rounded-md border border-pink-100 flex items-center justify-center leading-none text-center">
                                    <span x-text="char.plName ? char.plName + '（' + char.pcName + '）' : char.pcName"></span>
                                </span>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div class="hidden md:block bg-white rounded-2xl border border-pink-100 overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[950px]">
                    <thead>
                        <tr class="bg-pink-50/30 border-b border-pink-100 text-xs font-bold text-slate-500 tracking-wider">
                            <th class="py-4 px-4 w-12 text-center"></th>
                            <th class="py-4 px-3 w-14 text-center">視聴</th>
                            <th class="py-4 px-4 w-28">配信日</th>
                            <th class="py-4 px-4 w-32">サムネイル</th>
                            <th class="py-4 px-4">シナリオ / システム</th>
                            <th class="py-4 px-4 w-36">GM</th>
                            <th class="py-4 px-4">PL (PC)</th>
                            <th class="py-4 px-4 w-36 text-center">リンク</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-pink-50 text-sm">
                        <template x-for="stream in filteredStreams()" :key="'table-'+stream.id">
                            <tr :id="'pc-'+stream.id" @click="openModal(stream)" class="hover:bg-pink-50/30 transition-all duration-300 cursor-pointer" :class="isWatched(stream.id) ? 'bg-pink-50/15' : ''">
                                <td class="py-4 px-4 text-center" @click.stop>
                                    <button @click="toggleFavorite(stream.id)" class="p-1 focus:outline-none cursor-pointer" title="お気に入り">
                                        <div class="w-2.5 h-2.5 rounded-full border mx-auto transition-all duration-200" 
                                             :class="isFavorite(stream.id) ? 'bg-pink-400 border-pink-400' : 'bg-slate-100 border-slate-200 hover:bg-pink-100'"></div>
                                    </button>
                                </td>
                                <td class="py-4 px-3 text-center" @click.stop>
                                    <input type="checkbox" :checked="isWatched(stream.id)" @change="toggleWatched(stream.id)" class="w-4 h-4 rounded border-pink-300 text-pink-500 focus:ring-pink-400 cursor-pointer accent-pink-500">
                                </td>
                                <td class="py-4 px-4 text-slate-400 font-semibold" x-text="stream.date"></td>
                                <td class="py-4 px-4">
                                    <template x-if="getYoutubeId(stream.links)">
                                        <div class="w-24 aspect-video bg-pink-50 rounded-lg overflow-hidden border border-pink-100/60 shadow-sm transform hover:scale-105 transition-transform duration-200">
                                            <img :src="'https://img.youtube.com/vi/' + getYoutubeId(stream.links) + '/mqdefault.jpg'" alt="Thumbnail" class="w-full h-full object-cover">
                                        </div>
                                    </template>
                                    <template x-if="!getYoutubeId(stream.links)">
                                        <div class="w-24 aspect-video bg-pink-50/40 rounded-lg flex items-center justify-center border border-pink-100/30 text-[10px] text-pink-200 font-bold">
                                            NO IMAGE
                                        </div>
                                    </template>
                                </td>
                                <td class="py-4 px-4">
                                    <div class="font-bold text-slate-900 tracking-wide text-[15px] leading-snug" x-text="stream.scenario"></div>
                                    <span class="inline-block bg-slate-100 text-slate-500 text-xs px-2 py-0.5 rounded-md mt-2 font-medium" x-text="stream.system"></span>
                                </td>
                                <td class="py-4 px-4 font-bold text-slate-700" x-text="stream.gm"></td>
                                <td class="py-4 px-4">
                                    <div class="flex flex-wrap gap-1.5">
                                        <template x-for="char in stream.characters">
                                            <span class="bg-pink-50/50 text-pink-700 text-xs font-medium px-2.5 py-1 rounded-xl border border-pink-100/40">
                                                <span x-text="char.plName ? char.plName + '（' + char.pcName + '）' : char.pcName"></span>
                                            </span>
                                        </template>
                                    </div>
                                </td>
                                <td class="py-4 px-4 text-center" @click.stop>
                                    <div class="flex flex-col gap-1.5 max-w-[120px] mx-auto">
                                        <template x-for="link in stream.links">
                                            <a :href="link.url" target="_blank" class="inline-block w-full bg-pink-500 hover:bg-pink-600 text-white text-[11px] py-1 px-2 rounded-lg font-medium transition-colors shadow-sm tracking-wider" x-text="link.label"></a>
                                        </template>
                                        <template x-if="stream.hashtag">
                                            <a :href="'https://x.com/search?q=' + encodeURIComponent('#' + stream.hashtag)" target="_blank" class="inline-block w-full bg-slate-700 hover:bg-slate-600 text-white text-[10px] py-0.5 px-2 rounded-lg font-normal transition-colors overflow-hidden text-ellipsis whitespace-nowrap" x-text="stream.hashtag"></a>
                                        </template>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <template x-if="filteredStreams().length === 0 && updatedAt !== '同期中...'">
            <div class="bg-white rounded-2xl border border-pink-100 p-12 text-center text-slate-400 font-medium shadow-sm">該当する配信データが見つかりません。</div>
        </template>

        <div id="dynamic-capture-studio"></div>

        <div x-show="modalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40" @click.self="closeModal()" style="display: none;">
            <div class="bg-white rounded-2xl shadow-xl border border-pink-100 max-w-md w-full overflow-hidden flex flex-col max-h-[85vh] relative z-50">
                <div class="bg-slate-900 px-6 py-4 flex justify-between items-center text-white shrink-0">
                    <h3 class="font-bold text-sm tracking-wider truncate mr-4" x-text="activeStream.scenario"></h3>
                    <button @click="closeModal()" class="text-white/60 hover:text-white text-2xl font-light transition-colors leading-none cursor-pointer">&times;</button>
                </div>
                
                <div class="p-6 space-y-4 text-xs sm:text-sm flex-1 overflow-y-auto bg-white">
                    
                    <template x-if="activeStream.adminNote">
                        <div class="text-slate-700 bg-pink-50/30 p-3 rounded-xl border border-pink-100/80 leading-relaxed font-normal flex gap-1.5 items-start">
                            <span class="shrink-0 select-none">💡</span>
                            <div class="whitespace-pre-wrap text-xs sm:text-sm flex-1" 
                                 x-html="renderAdminNote(activeStream.adminNote)"
                                 @click="handleInlineClick($event)"></div>
                        </div>
                    </template>

                    <div class="space-y-4">
                        <template x-for="char in activeStream.characters">
                            <template x-if="char.profile || char.history || char.note || char.charasheetUrl">
                                <div class="bg-white rounded-xl p-4 border border-pink-100 space-y-3 shadow-2xs">
                                    <div class="flex items-baseline justify-between flex-wrap gap-x-2 border-b border-pink-50 pb-1.5">
                                        <div class="font-bold text-slate-800 text-sm sm:text-base">
                                            👤 <span x-text="char.pcName"></span>
                                        </div>
                                        <div class="text-[11px] text-slate-500">
                                            PL: <span class="font-bold text-slate-600" x-text="char.plName || '未登録'"></span>
                                        </div>
                                    </div>
                                    
                                    <div class="text-[11px] sm:text-xs space-y-3 text-slate-600">
                                        <template x-if="char.profile">
                                            <div>
                                                <div class="font-bold text-slate-400 text-[10px] uppercase tracking-wider mb-0.5">プロフィール</div>
                                                <div class="text-slate-700 bg-slate-50/50 p-2 rounded-lg border border-slate-100/60" x-text="char.profile"></div>
                                            </div>
                                        </template>

                                        <template x-if="char.history">
                                            <div>
                                                <div class="font-bold text-slate-400 text-[10px] uppercase tracking-wider mb-1">通過済みシナリオ</div>
                                                <div class="grid grid-cols-1 gap-1.5">
                                                    <template x-for="line in parseHistoryLinks(char.history)">
                                                        <div>
                                                            <template x-if="line.url">
                                                                <a :href="line.url" target="_blank" class="flex items-center justify-between w-full bg-pink-50/30 hover:bg-pink-100/40 text-pink-700 font-bold px-3 py-2 rounded-xl border border-pink-200/40 transition-colors text-left text-xs">
                                                                    <span x-text="line.title"></span>
                                                                    <span class="text-[10px] font-normal text-pink-400">↗</span>
                                                                </a>
                                                            </template>
                                                            
                                                            <template x-if="!line.url">
                                                                <div class="text-slate-600 bg-slate-50/80 px-3 py-2 rounded-xl border border-slate-100/70 font-medium text-xs" x-text="line.title"></div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>

                                        <template x-if="char.note">
                                            <div class="text-slate-700 leading-relaxed whitespace-pre-wrap text-xs sm:text-sm pt-1" 
                                                 x-html="renderCharNote(char.note)">
                                            </div>
                                        </template>

                                        <template x-if="char.charasheetUrl">
                                            <div class="pt-1">
                                                <a :href="char.charasheetUrl" target="_blank" class="inline-flex items-center gap-1 text-pink-500 font-bold hover:underline">
                                                    <span>キャラクターシートを見る</span>
                                                    <span class="text-[10px]">↗</span>
                                                </a>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </template>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <script>
        function app() {
            return {
                updatedAt: "同期中...",
                streams: [],
                searchQuery: "",
                kosakaRole: "all",
                selectedStatus: "all",
                startDate: "",
                endDate: "",
                sortOrder: "desc",
                watchedIds: [],
                favoriteIds: [],
                showFavoritesOnly: false,
                modalOpen: false,
                activeStream: {},

                async initApp() {
                    const savedWatched = localStorage.getItem('trpg_watched_ids');
                    if (savedWatched) this.watchedIds = JSON.parse(savedWatched);

                    const savedFavs = localStorage.getItem('trpg_fav_ids');
                    if (savedFavs) this.favoriteIds = JSON.parse(savedFavs);
                    
                    try {
                        const response = await fetch('https://na-nasika.github.io/ktrpg-fan-db/data.json');
                        if (!response.ok) throw new Error('データが見つかりません');
                        const data = await response.json();
                        
                        this.streams = data.streams;
                        this.updatedAt = data.updatedAt;
                    } catch (error) {
                        console.error("データの読み込みに失敗しました:", error);
                        this.updatedAt = "読み込みエラー";
                    }
                },

                formatDateOnly(dateTimeStr) {
                    if (!dateTimeStr || dateTimeStr === "同期中..." || dateTimeStr === "読み込みエラー") return dateTimeStr;
                    return dateTimeStr.split(" ")[0];
                },

                parseHistoryLinks(text) {
                    if (!text) return [];
                    const items = [];
                    const lines = text.split('\n');

                    for (let i = 0; i < lines.length; i++) {
                        const cleanLine = lines[i].trim();
                        if (!cleanLine) continue; 

                        let title = cleanLine;
                        let url = null;

                        const httpIndex = cleanLine.indexOf('http');
                        if (httpIndex !== -1) {
                            title = cleanLine.substring(0, httpIndex).trim();
                            url = cleanLine.substring(httpIndex).trim();
                        } else {
                            title = cleanLine;
                            url = null;
                        }

                        title = title.replace(/[:：\s]+$/, '').trim();
                        if (!title) title = 'シナリオ';

                        items.push({ title: title, url: url });
                    }
                    return items;
                },

                // 📝 セッション詳細：[表示](URL) などを綺麗に埋め込む
                renderAdminNote(text) {
                    if (!text) return '';
                    
                    let safeText = text
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#039;');

                    // Markdown風リンク
                    safeText = safeText.replace(/\[(.*?)\]\((https?:\/\/.*?)\)/g, (match, label, url) => {
                        return `<a href="${url}" target="_blank" class="text-pink-500 font-bold hover:underline inline-flex items-center gap-0.5">${label}<span class="text-[10px] font-normal text-pink-400">↗</span></a>`;
                    });

                    // @IDリンク
                    safeText = safeText.replace(/@(\d+)/g, (match, id) => {
                        const targetId = 'stream_' + id;
                        const found = this.streams.find(s => s.id === targetId);
                        const titleText = found ? found.scenario : `@${id}`;
                        return `<span data-jump-id="${targetId}" class="text-pink-500 font-bold underline cursor-pointer hover:text-pink-700 select-none">${titleText}<span class="text-[10px] font-normal text-pink-400 ml-0.5">↗</span></span>`;
                    });

                    return safeText;
                },

                // 📝 セッション詳細：@IDクリック時にモーダルを閉じてスクロール移動
                handleInlineClick(event) {
                    const jumpId = event.target.getAttribute('data-jump-id');
                    if (jumpId) {
                        this.closeModal();

                        setTimeout(() => {
                            const isMobile = window.innerWidth < 768;
                            const elementId = (isMobile ? 'mobile-' : 'pc-') + jumpId;
                            const targetElement = document.getElementById(elementId);

                            if (targetElement) {
                                targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                targetElement.classList.add('highlight-target');
                                setTimeout(() => {
                                    targetElement.classList.remove('highlight-target');
                                }, 1500);
                            } else {
                                alert('該当するセッションが現在の一覧に見つかりませんでした。フィルターを解除して再度お試しください。');
                            }
                        }, 150);
                    }
                },

                // 📝 PC詳細：ハッシュタグを控えめな下線リンクに変換する
                renderCharNote(text) {
                    if (!text) return '';

                    let safeText = text
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');

                    // 全角スペースや改行対応で#をキャッチし、控えめな下線のみのスタイルを適用
                    safeText = safeText.replace(/(#[^\s#\n\r]+)/g, (match) => {
                        const tagName = match.substring(1).trim();
                        return `<span onclick="window.dispatchEvent(new CustomEvent('search-tag', {detail: '${tagName}'}))" class="text-slate-600 underline decoration-slate-400/60 hover:text-pink-600 hover:decoration-pink-500 font-semibold cursor-pointer select-none transition-colors">${match}</span>`;
                    });

                    return safeText;
                },

                searchByTag(tagName) {
                    this.searchQuery = tagName;
                    this.closeModal();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                getYoutubeId(links) {
                    if (!links || links.length === 0) return null;
                    const ytLink = links.find(l => l.url && (l.url.includes('youtube.com') || l.url.includes('youtu.be')));
                    if (!ytLink || !ytLink.url) return null;
                    const url = ytLink.url.trim();
                    if (url.includes('watch?v=')) {
                        const parts = url.split('v=');
                        if (parts[1]) return parts[1].split('&')[0];
                    }
                    const pathTypes = ['/live/', '/shorts/', '/embed/'];
                    for (const type of pathTypes) {
                        if (url.includes(type)) {
                            const parts = url.split(type);
                            if (parts[1]) return parts[1].split('?')[0].split('&')[0];
                        }
                    }
                    if (url.includes('youtu.be/')) {
                        const parts = url.split('youtu.be/');
                        if (parts[1]) return parts[1].split('?')[0].split('&')[0];
                    }
                    return null;
                },

                toggleRole(role) {
                    this.kosakaRole = this.kosakaRole === role ? "all" : role;
                },

                toggleStatus(status) {
                    this.selectedStatus = this.selectedStatus === status ? "all" : status;
                },

                toggleSortOrder() {
                    this.sortOrder = this.sortOrder === 'desc' ? 'asc' : 'desc';
                },

                toggleFavoriteFilter() {
                    this.showFavoritesOnly = !this.showFavoritesOnly;
                },

                filteredStreams() {
                    let result = this.streams.filter(stream => {
                        const query = this.searchQuery.toLowerCase();
                        const matchQuery = !query || 
                            stream.scenario.toLowerCase().includes(query) ||
                            stream.system.toLowerCase().includes(query) ||
                            stream.gm.toLowerCase().includes(query) ||
                            (stream.adminNote && stream.adminNote.toLowerCase().includes(query)) ||
                            (stream.hashtag && stream.hashtag.toLowerCase().includes(query)) ||
                            stream.characters.some(c => 
                                (c.pcName && c.pcName.toLowerCase().includes(query)) || 
                                (c.plName && c.plName.toLowerCase().includes(query)) ||
                                (c.note && c.note.toLowerCase().includes(query))
                            );

                        let matchKosaka = true;
                        if (this.kosakaRole === 'gm') {
                            matchKosaka = stream.gm.includes('コーサカ');
                        } else if (this.kosakaRole === 'pl') {
                            matchKosaka = stream.characters.some(c => c.plName && c.plName.includes('コーサカ'));
                        }

                        let matchDate = true;
                        const streamDateStr = stream.date.replace(/\//g, '-');
                        if (this.startDate && streamDateStr < this.startDate) matchDate = false;
                        if (this.endDate && streamDateStr > this.endDate) matchDate = false;
                        
                        let matchStatus = true;
                        const watched = this.isWatched(stream.id);
                        if (this.selectedStatus === 'watched') matchStatus = watched;
                        if (this.selectedStatus === 'unwatched') matchStatus = !watched;

                        let matchFav = true;
                        if (this.showFavoritesOnly) matchFav = this.isFavorite(stream.id);

                        return matchQuery && matchKosaka && matchDate && matchStatus && matchFav;
                    });

                    return result.sort((a, b) => {
                        const dateA = new Date(a.date);
                        const dateB = new Date(b.date);
                        return this.sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
                    });
                },

                isWatched(id) {
                    return this.watchedIds.includes(id);
                },

                toggleWatched(id) {
                    if (this.isWatched(id)) {
                        this.watchedIds = this.watchedIds.filter(wId => wId !== id);
                    } else {
                        this.watchedIds.push(id);
                    }
                    localStorage.setItem('trpg_watched_ids', JSON.stringify(this.watchedIds));
                },

                isFavorite(id) {
                    return this.favoriteIds.includes(id);
                },

                toggleFavorite(id) {
                    if (this.isFavorite(id)) {
                        this.favoriteIds = this.favoriteIds.filter(fId => fId !== id);
                    } else {
                        this.favoriteIds.push(id);
                    }
                    localStorage.setItem('trpg_fav_ids', JSON.stringify(this.favoriteIds));
                },

                async downloadAsImage() {
                    const studio = document.getElementById('dynamic-capture-studio');
                    if (!studio) return;
                    
                    studio.innerHTML = '';
                    
                    const gridWrapper = document.createElement('div');
                    gridWrapper.className = 'studio-grid';
                    
                    const currentFavStreams = this.filteredStreams();
                    if (currentFavStreams.length === 0) {
                        alert("保存するデータがありません。");
                        return;
                    }

                    currentFavStreams.forEach(stream => {
                        const card = document.createElement('div');
                        card.className = "bg-white rounded-2xl border border-pink-100 p-4 shadow-sm space-y-3 relative";
                        card.style.width = '354px';
                        card.style.maxWidth = '354px';
                        card.style.display = 'block';

                        const header = document.createElement('div');
                        header.className = "flex items-center justify-between border-b border-pink-50 pb-2";
                        
                        const leftGroup = document.createElement('div');
                        leftGroup.className = "flex items-center gap-2";
                        leftGroup.innerHTML = `<div class="w-2.5 h-2.5 rounded-full bg-pink-400 border border-pink-400"></div><span class="text-xs text-slate-400 font-medium">${stream.date}</span>`;
                        
                        header.appendChild(leftGroup);
                        card.appendChild(header);

                        const centerSection = document.createElement('div');
                        centerSection.className = "flex gap-3 items-center";
                        
                        const ytId = this.getYoutubeId(stream.links);
                        const thumbHtml = ytId 
                            ? `<div class="w-28 shrink-0 aspect-video h-[64px] bg-pink-50 rounded-lg overflow-hidden border border-pink-100/60 shadow-sm"><img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" class="w-full h-full object-cover"></div>`
                            : `<div class="w-28 shrink-0 aspect-video h-[64px] bg-pink-50/50 rounded-lg flex items-center justify-center border border-pink-100/40"><span class="text-[10px] text-pink-300 font-bold">NO IMAGE</span></div>`;
                        
                        centerSection.innerHTML = thumbHtml;

                        const textCell = document.createElement('div');
                        textCell.className = "studio-middle-cell flex-1 min-w-0";
                        textCell.style.display = 'table-cell';
                        textCell.style.verticalAlign = 'middle';
                        textCell.innerHTML = `
                            <div class="font-bold text-slate-900 tracking-wide text-xs leading-snug break-words">${stream.scenario}</div>
                            <div class="mt-0.5 leading-none"><span class="inline-block bg-slate-100 text-slate-500 text-[9px] px-1.5 py-0.5 rounded-md font-medium">${stream.system}</span></div>
                        `;
                        centerSection.appendChild(textCell);
                        card.appendChild(centerSection);

                        const gmSection = document.createElement('div');
                        gmSection.className = "flex items-center justify-between gap-2 pt-1";
                        gmSection.innerHTML = `
                            <div class="text-[11px] text-slate-500 truncate flex items-center pt-0.5 pb-1 leading-loose" style="line-height: 2 !important;">
                                <span class="font-bold text-slate-400 mr-1">GM:</span>
                                <span class="font-bold text-slate-700">${stream.gm}</span>
                            </div>
                        `;
                        card.appendChild(gmSection);

                        const plSection = document.createElement('div');
                        plSection.className = "bg-pink-50/20 rounded-xl p-2.5 text-[11px] border border-pink-50/50 flex flex-wrap gap-1 mt-1 items-center";
                        
                        let plBadges = `<span class="text-slate-400 font-bold mr-1 shrink-0">PL:</span><div class="flex flex-wrap gap-1 flex-1 items-center">`;
                        stream.characters.forEach(char => {
                            const nameText = char.plName ? `${char.plName}（${char.pcName}）` : char.pcName;
                            plBadges += `<span class="bg-white text-pink-700 text-[10px] font-medium px-1.5 py-1 rounded-md border border-pink-100 flex items-center justify-center leading-none text-center">${nameText}</span>`;
                        });
                        plBadges += `</div>`;
                        plSection.innerHTML = plBadges;
                        card.appendChild(plSection);

                        gridWrapper.appendChild(card);
                    });
                    
                    studio.appendChild(gridWrapper);
                    
                    try {
                        const canvas = await html2canvas(studio, {
                            useCORS: true, 
                            backgroundColor: '#fff5f5', 
                            scale: 2, 
                            logging: false,
                            onclone: (clonedDoc) => {
                                const targetStudio = clonedDoc.getElementById('dynamic-capture-studio');
                                if (targetStudio) {
                                    targetStudio.style.position = 'static';
                                    targetStudio.style.top = '0';
                                    targetStudio.style.left = '0';
                                }
                            }
                        });
                        
                        const link = document.createElement('a');
                        link.download = `kosaka_trpg_favorites_${new Date().toISOString().slice(0,10)}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch (error) {
                        console.error("画像の生成に失敗しました:", error);
                        alert("画像の保存中にエラーが発生しました。");
                    } finally {
                        studio.innerHTML = ''; 
                    }
                },

                openModal(streamData) {
                    this.activeStream = streamData;
                    this.modalOpen = true;
                },

                closeModal() {
                    this.modalOpen = false;
                    this.activeStream = {};
                }
            }
        }

        // 🛠️ Alpineのスコープ外から安全に検索を実行するためのイベントリスナー
        window.addEventListener('search-tag', (e) => {
            const appEl = document.querySelector('[x-data]');
            if (appEl && appEl.__x) {
                appEl.__x.$data.searchByTag(e.detail);
            }
        });
    </script>
</body>
</html>
