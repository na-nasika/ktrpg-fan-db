<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦇 KOSAKA TRPG FANMADE-DB [非公式]</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        /* スクロールバーも可愛くマゼンタに */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #fdf2f8; }
        ::-webkit-scrollbar-thumb { background: #ec4899; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #db2777; }
    </style>
</head>
<body class="bg-pink-50/30 text-slate-800 font-sans antialiased selection:bg-pink-200 selection:text-pink-900">

    <div x-data="app()" x-init="initApp()" class="max-w-6xl mx-auto px-4 py-8">
        
        <header class="mb-8 text-center relative py-6 bg-white rounded-2xl shadow-xs border border-pink-100 overflow-hidden">
            <div class="absolute top-2 left-4 text-pink-200 text-2xl select-none">🦇</div>
            <div class="absolute bottom-2 right-4 text-pink-200 text-3xl select-none animate-bounce">🦇</div>
            
            <h1 class="text-2xl md:text-3xl font-extrabold text-pink-600 mb-2 tracking-wide flex items-center justify-center gap-2">
                <span>🦇</span> KOSAKA TRPG FANMADE-DB <span class="text-xs bg-pink-100 text-pink-700 px-2 py-1 rounded-full font-bold align-middle">非公式</span>
            </h1>
            <p class="text-xs font-bold text-slate-400 tracking-wider uppercase">kosaka trpg fanmade database</p>
            <div class="mt-4 inline-block bg-pink-50 text-pink-700 text-xs px-3 py-1 rounded-full font-medium border border-pink-100">
                最終更新: <span x-text="updatedAt" class="font-bold"></span>
            </div>
        </header>

        <div class="bg-white p-5 rounded-2xl shadow-xs border border-pink-100 mb-6 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-bold text-pink-600 mb-1">🔍 キーワード検索</label>
                    <input type="text" x-model="searchQuery" placeholder="シナリオ、システム、PL、PC名..." class="w-full bg-pink-50/50 border border-pink-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400 transition-all">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-pink-600 mb-1">🦇 コーサカ配役</label>
                    <select x-model="kosakaRole" class="w-full bg-pink-50/50 border border-pink-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400 transition-all">
                        <option value="all">すべて表示</option>
                        <option value="gm">🎙️ GM（ゲームマスター）</option>
                        <option value="pl">🎲 PL（プレイヤー）</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-pink-600 mb-1">📅 期間で絞り込み</label>
                    <div class="flex items-center gap-2">
                        <input type="date" x-model="startDate" class="w-full bg-pink-50/50 border border-pink-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400 transition-all">
                        <span class="text-slate-400 text-xs">〜</span>
                        <input type="date" x-model="endDate" class="w-full bg-pink-50/50 border border-pink-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400 transition-all">
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap items-center justify-between gap-4 pt-2 border-t border-slate-100">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-slate-400">ステータス:</span>
                    <div class="inline-flex rounded-lg p-0.5 bg-slate-100 text-xs">
                        <button @click="selectedStatus = 'all'" :class="selectedStatus === 'all' ? 'bg-white text-pink-600 font-bold shadow-xs' : 'text-slate-600'" class="px-3 py-1 rounded-md transition-all">すべて</button>
                        <button @click="selectedStatus = 'watched'" :class="selectedStatus === 'watched' ? 'bg-pink-500 text-white font-bold shadow-xs' : 'text-slate-600'" class="px-3 py-1 rounded-md transition-all">✅ 視聴済み</button>
                        <button @click="selectedStatus = 'unwatched'" :class="selectedStatus === 'unwatched' ? 'bg-white text-slate-700 font-bold shadow-xs border border-slate-200' : 'text-slate-600'" class="px-3 py-1 rounded-md transition-all">⬜ 未視聴</button>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-slate-400">日付順:</span>
                    <button @click="toggleSortOrder()" class="bg-pink-50 hover:bg-pink-100 text-pink-700 text-xs font-bold px-3 py-1.5 rounded-xl border border-pink-200 transition-all flex items-center gap-1">
                        <span x-text="sortOrder === 'desc' ? '⏳ 新しい順 (降順)' : '⌛ 古い順 (昇順)'"></span>
                        <span>🔄</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xs border border-pink-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-pink-50/60 border-b border-pink-100 text-xs font-bold text-pink-700 uppercase tracking-wider">
                            <th class="py-3.5 px-4 w-16 text-center">視聴</th>
                            <th class="py-3.5 px-4 w-32">配信日</th>
                            <th class="py-3.5 px-4">シナリオ / システム</th>
                            <th class="py-3.5 px-4">GM</th>
                            <th class="py-3.5 px-4">PL (PC ※タップで詳細)</th>
                            <th class="py-3.5 px-4 w-36 text-center">リンク</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-pink-50 text-sm">
                        <template x-for="stream in filteredStreams()" :key="stream.id">
                            <tr class="hover:bg-pink-50/20 transition-colors" :class="isWatched(stream.id) ? 'bg-pink-50/40' : ''">
                                <td class="py-4 px-4 text-center">
                                    <input type="checkbox" :checked="isWatched(stream.id)" @change="toggleWatched(stream.id)" class="w-5 h-5 rounded-md border-pink-300 text-pink-600 focus:ring-pink-400 cursor-pointer accent-pink-600">
                                </td>
                                <td class="py-4 px-4 text-slate-500 font-medium" x-text="stream.date"></td>
                                <td class="py-4 px-4">
                                    <div class="font-bold text-slate-900 text-base" x-text="stream.scenario"></div>
                                    <span class="inline-block bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-md mt-1 font-medium" x-text="stream.system"></span>
                                </td>
                                <td class="py-4 px-4 font-semibold text-slate-700">
                                    <span x-text="stream.gm"></span>
                                    <template x-if="stream.gm.includes('コーサカ')">
                                        <span class="inline-block bg-pink-100 text-pink-700 text-[10px] px-1.5 py-0.2 rounded-sm ml-1 font-bold">🎙️</span>
                                    </template>
                                </td>
                                <td class="py-4 px-4">
                                    <div class="flex flex-wrap gap-1.5">
                                        <template x-for="char in stream.characters">
                                            <button @click="openModal(char)" class="bg-pink-50 text-pink-700 hover:bg-pink-100 text-xs font-bold px-2 py-1 rounded-lg cursor-pointer border border-pink-100 transition-colors flex items-center gap-1">
                                                <span x-text="char.plName ? char.plName + '（' + char.pcName + '）' : char.pcName"></span>
                                                <template x-if="char.plName.includes('コーサカ') || char.pcName.includes('コーサカ')">
                                                    <span class="text-[10px]">🎲</span>
                                                </template>
                                            </button>
                                        </template>
                                    </div>
                                </td>
                                <td class="py-4 px-4 text-center">
                                    <div class="flex flex-col gap-1">
                                        <template x-for="link in stream.links">
                                            <a :href="link.url" target="_blank" class="inline-block w-full bg-pink-600 hover:bg-pink-700 text-white text-xs py-1 px-2 rounded-lg font-bold shadow-xs transition-colors" x-text="link.label"></a>
                                        </template>
                                        <template x-if="stream.hashtag">
                                            <a :href="'https://x.com/search?q=' + encodeURIComponent(stream.hashtag)" target="_blank" class="inline-block w-full bg-slate-900 hover:bg-slate-800 text-white text-[11px] py-1 px-2 rounded-lg font-medium transition-colors" x-text="stream.hashtag"></a>
                                        </template>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <template x-if="filteredStreams().length === 0">
                <div class="p-12 text-center text-slate-400 font-medium">該当する配信データが見つかりません。🦇</div>
            </template>
        </div>

        <div x-show="modalOpen" x-transition class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-xs" @click.self="closeModal()" style="display: none;">
            <div class="bg-white rounded-2xl shadow-xl border border-pink-100 max-w-md w-full overflow-hidden transform transition-all">
                <div class="bg-pink-600 px-6 py-4 flex justify-between items-center text-white">
                    <h3 class="font-bold text-lg flex items-center gap-1">
                        <span>🦇</span> <span x-text="selectedPc.pcName"></span>
                    </h3>
                    <button @click="closeModal()" class="text-white/85 hover:text-white text-2xl font-bold transition-colors">&times;</button>
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <span class="block text-xs font-bold text-pink-400 uppercase mb-0.5">プレイヤー (PL)</span>
                        <div class="text-slate-800 font-bold text-base" x-text="selectedPc.plName || '未登録'"></div>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-pink-400 uppercase mb-0.5">キャラクター属性/プロフィール</span>
                        <div class="text-slate-700 bg-pink-50/40 p-3 rounded-xl whitespace-pre-wrap text-sm border border-pink-50" x-text="selectedPc.profile || '未登録'"></div>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-pink-400 uppercase mb-0.5">継続セッション数 / 履歴</span>
                        <div class="text-slate-700 text-sm font-medium" x-text="selectedPc.history || '未登録'"></div>
                    </div>
                    <template x-if="selectedPc.charasheetUrl">
                        <div>
                            <span class="block text-xs font-bold text-pink-400 uppercase mb-0.5">キャラクターシート</span>
                            <a :href="selectedPc.charasheetUrl" target="_blank" class="text-pink-600 hover:text-pink-700 font-bold text-sm inline-flex items-center gap-1 hover:underline">キャラシを見る ↗</a>
                        </div>
                    </template>
                    <div>
                        <span class="block text-xs font-bold text-pink-400 uppercase mb-0.5">備考</span>
                        <div class="text-slate-600 text-sm whitespace-pre-wrap" x-text="selectedPc.note || '-'"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function app() {
            return {
                updatedAt: "同期中...",
                streams: [],
                searchQuery: "",
                kosakaRole: "all", // コーサカフィルター用の状態
                startDate: "",     // 期間フィルター（開始）
                endDate: "",       // 期間フィルター（終了）
                selectedStatus: "all",
                sortOrder: "desc", // ソート順の状態 ('desc' または 'asc')
                watchedIds: [],
                modalOpen: false,
                selectedPc: {},

                // 初期化処理
                async initApp() {
                    const saved = localStorage.getItem('trpg_watched_ids');
                    if (saved) {
                        this.watchedIds = JSON.parse(saved);
                    }
                    
                    try {
                        // 💡 👇 ここをあなたのGitHubアカウント名とリポジトリ名に必ず書き換えてください！ 👇
                        const response = await fetch('https://na-nasika.github.io/ktrpg-fan-db/data.json');
                        if (!response.ok) throw new Error('データが見つかりません');
                        const data = await response.json();
                        
                        this.streams = data.streams;
                        this.updatedAt = data.updatedAt;
                    } catch (error) {
                        console.error("データの読み込みに失敗しました:", error);
                        this.updatedAt = "データの同期を待っています...";
                    }
                },

                // 昇順・降順の切り替え
                toggleSortOrder() {
                    this.sortOrder = this.sortOrder === 'desc' ? 'asc' : 'desc';
                },

                // 爆速フィルター＆並び替えロジック
                filteredStreams() {
                    // まず条件で絞り込み
                    let result = this.streams.filter(stream => {
                        // 1. キーワード検索 (シナリオ、システム、GM、ハッシュタグ、PL、PC)
                        const query = this.searchQuery.toLowerCase();
                        const matchQuery = !query || 
                            stream.scenario.toLowerCase().includes(query) ||
                            stream.system.toLowerCase().includes(query) ||
                            stream.gm.toLowerCase().includes(query) ||
                            (stream.hashtag && stream.hashtag.toLowerCase().includes(query)) ||
                            stream.characters.some(c => 
                                (c.pcName && c.pcName.toLowerCase().includes(query)) || 
                                (c.plName && c.plName.toLowerCase().includes(query))
                            );

                        // 2. コーサカ配役フィルター
                        let matchKosaka = true;
                        if (this.kosakaRole === 'gm') {
                            matchKosaka = stream.gm.includes('コーサカ');
                        } else if (this.kosakaRole === 'pl') {
                            matchKosaka = stream.characters.some(c => c.plName.includes('コーサカ'));
                        }

                        // 3. 期間フィルター (日付文字列 'YYYY/MM/DD' のままで比較可能)
                        let matchDate = true;
                        const streamDateStr = stream.date.replace(/\//g, '-'); // ハイフンに変換して比較しやすく
                        if (this.startDate && streamDateStr < this.startDate) matchDate = false;
                        if (this.endDate && streamDateStr > this.endDate) matchDate = false;
                        
                        // 4. 視聴ステータス
                        let matchStatus = true;
                        const watched = this.isWatched(stream.id);
                        if (this.selectedStatus === 'watched') matchStatus = watched;
                        if (this.selectedStatus === 'unwatched') matchStatus = !watched;

                        return matchQuery && matchKosaka && matchDate && matchStatus;
                    });

                    // 次に日付でソート（並び替え）
                    return result.sort((a, b) => {
                        const dateA = new Date(a.date);
                        const dateB = new Date(b.date);
                        return this.sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
                    });
                },

                isWatched(id) {
                    return this.watchedIds.includes(id);
                },

                toggleWatched(id) {
                    if (this.isWatched(id)) {
                        this.watchedIds = this.watchedIds.filter(wId => wId !== id);
                    } else {
                        this.watchedIds.push(id);
                    }
                    localStorage.setItem('trpg_watched_ids', JSON.stringify(this.watchedIds));
                },

                openModal(charData) {
                    this.selectedPc = charData;
                    this.modalOpen = true;
                },

                closeModal() {
                    this.modalOpen = false;
                    this.selectedPc = {};
                }
            }
        }
    </script>
</body>
</html>
