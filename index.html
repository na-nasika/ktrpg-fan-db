<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コーサカTRPGまとめ [非公式]</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            font-family: 'M PLUS 1p', 'Noto Sans JP', sans-serif;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #fff5f5; }
        ::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ec4899; }
    </style>
</head>
<body class="bg-pink-50/40 text-slate-800 antialiased selection:bg-pink-100 selection:text-pink-900">

    <div x-data="app()" x-init="initApp()" class="max-w-6xl mx-auto px-4 py-6 sm:py-8">
        
        <header class="mb-5 sm:mb-6 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3 pb-5 border-b border-pink-200">
            <div class="flex items-center gap-3">
                <span class="text-2xl inline-block transform rotate-[-12deg] select-none text-pink-500">🦇</span>
                <h1 class="text-xl sm:text-2xl font-black text-slate-900 tracking-wider">コーサカTRPGまとめ</h1>
                <span class="text-[10px] bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full font-bold border border-pink-200 tracking-wide">非公式</span>
            </div>
            
            <div class="text-xs text-slate-400 font-medium tracking-tight flex flex-wrap items-center gap-x-4 gap-y-1 sm:justify-end">
                <div>
                    該当セッション: <span x-text="filteredStreams().length" class="text-pink-600 font-black text-sm"></span> <span class="text-[11px] font-bold text-slate-400">件</span>
                </div>
                <div class="hidden sm:block text-pink-200">|</div>
                <div>
                    最終更新: <span x-text="updatedAt" class="text-pink-600 font-bold"></span>
                </div>
            </div>
        </header>

        <div class="bg-white p-3 sm:p-4 rounded-2xl border border-pink-100 mb-6 space-y-3 shadow-xs">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div>
                    <input type="text" x-model="searchQuery" placeholder="🔍 シナリオ、システム、PL、PC名..." class="w-full bg-pink-50/20 border border-pink-150 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-transparent transition-all">
                </div>

                <div class="md:col-span-2 flex flex-col sm:flex-row sm:items-center gap-2">
                    <div class="flex items-center w-full bg-pink-50/20 border border-pink-150 rounded-xl px-3 py-0.5">
                        <span class="text-[11px] font-bold text-pink-400 mr-2 whitespace-nowrap sm:hidden">開始</span>
                        <input type="date" x-model="startDate" class="w-full bg-transparent text-sm focus:outline-none py-1 text-slate-600 cursor-pointer">
                    </div>
                    <span class="text-pink-300 text-xs font-bold text-center hidden sm:inline">〜</span>
                    <div class="flex items-center w-full bg-pink-50/20 border border-pink-150 rounded-xl px-3 py-0.5">
                        <span class="text-[11px] font-bold text-pink-400 mr-2 whitespace-nowrap sm:hidden">終了</span>
                        <input type="date" x-model="endDate" class="w-full bg-transparent text-sm focus:outline-none py-1 text-slate-600 cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap items-center justify-between gap-3 pt-2.5 border-t border-pink-50 text-xs">
                <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                    <div class="inline-flex gap-1 bg-pink-50/60 p-1 rounded-xl border border-pink-100">
                        <button @click="toggleRole('gm')" :class="kosakaRole === 'gm' ? 'bg-pink-500 text-white font-bold shadow-xs' : 'text-slate-600 hover:bg-pink-100/50'" class="px-3 py-1 rounded-lg transition-all cursor-pointer">GM</button>
                        <button @click="toggleRole('pl')" :class="kosakaRole === 'pl' ? 'bg-pink-500 text-white font-bold shadow-xs' : 'text-slate-600 hover:bg-pink-100/50'" class="px-3 py-1 rounded-lg transition-all cursor-pointer">PL</button>
                    </div>

                    <div class="inline-flex gap-1 bg-pink-50/60 p-1 rounded-xl border border-pink-100">
                        <button @click="toggleStatus('watched')" :class="selectedStatus === 'watched' ? 'bg-pink-500 text-white font-bold shadow-xs' : 'text-slate-600 hover:bg-pink-100/50'" class="px-3 py-1 rounded-lg transition-all cursor-pointer">✅ 視聴済み</button>
                        <button @click="toggleStatus('unwatched')" :class="selectedStatus === 'unwatched' ? 'bg-pink-500 text-white font-bold shadow-xs' : 'text-slate-600 hover:bg-pink-100/50'" class="px-3 py-1 rounded-lg transition-all cursor-pointer">⬜ 未視聴</button>
                    </div>
                </div>

                <button @click="toggleSortOrder()" class="ml-auto sm:ml-0 border border-pink-200 hover:bg-pink-50/50 text-slate-600 font-medium px-3 py-1 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer">
                    <span x-text="sortOrder === 'desc' ? '📅 新しい順' : '📅 古い順'"></span>
                </button>
            </div>
        </div>

        <div class="block md:hidden space-y-4">
            <template x-for="stream in filteredStreams()" :key="'card-'+stream.id">
                <div class="bg-white rounded-2xl border border-pink-100 p-4 shadow-xs space-y-3 transition-colors" :class="isWatched(stream.id) ? 'bg-pink-50/10' : ''">
                    <div class="flex items-center justify-between border-b border-pink-50 pb-2">
                        <span class="text-xs text-slate-400 font-medium" x-text="stream.date"></span>
                        <label class="flex items-center gap-1.5 text-xs text-slate-500 cursor-pointer select-none">
                            <input type="checkbox" :checked="isWatched(stream.id)" @change="toggleWatched(stream.id)" class="w-4 h-4 rounded border-pink-300 text-pink-500 focus:ring-pink-400 cursor-pointer accent-pink-500">
                            <span class="text-[11px]" x-text="isWatched(stream.id) ? '視聴済み' : '未視聴'"></span>
                        </label>
                    </div>

                    <div class="flex gap-3 items-start">
                        <template x-if="getYoutubeId(stream.links)">
                            <div class="w-28 shrink-0 aspect-video bg-pink-50 rounded-lg overflow-hidden border border-pink-100/60 shadow-2xs">
                                <img :src="'https://img.youtube.com/vi/' + getYoutubeId(stream.links) + '/mqdefault.jpg'" alt="Thumbnail" class="w-full h-full object-cover">
                            </div>
                        </template>
                        
                        <template x-if="!getYoutubeId(stream.links)">
                            <div class="w-28 shrink-0 aspect-video bg-pink-50/50 rounded-lg flex items-center justify-center border border-pink-100/40">
                                <span class="text-[10px] text-pink-300 font-bold">NO IMAGE</span>
                            </div>
                        </template>

                        <div class="space-y-1 flex-1 min-w-0">
                            <div class="font-bold text-slate-900 tracking-wide text-xs sm:text-sm leading-snug break-words" x-text="stream.scenario"></div>
                            <span class="inline-block bg-slate-100 text-slate-500 text-[9px] sm:text-[10px] px-1.5 py-0.2 rounded-md font-medium" x-text="stream.system"></span>
                        </div>
                    </div>

                    <div class="flex items-center justify-between gap-2 pt-1">
                        <div class="text-[11px] text-slate-500 truncate max-w-[60%]">
                            <span class="font-bold text-slate-400">GM:</span> <span x-text="stream.gm"></span>
                        </div>
                        
                        <div class="flex flex-col gap-1 w-24 shrink-0 text-center">
                            <template x-for="link in stream.links">
                                <a :href="link.url" target="_blank" class="inline-block w-full bg-pink-500 hover:bg-pink-600 text-white text-[10px] py-0.5 px-1.5 rounded-lg font-medium transition-colors shadow-xs" x-text="link.label"></a>
                            </template>
                            <template x-if="stream.hashtag">
                                <a :href="'https://x.com/search?q=' + encodeURIComponent(stream.hashtag)" target="_blank" class="inline-block w-full bg-slate-700 hover:bg-slate-600 text-white text-[9px] py-0.5 px-1.5 rounded-lg font-normal transition-colors overflow-hidden text-ellipsis whitespace-nowrap" x-text="stream.hashtag"></a>
                            </template>
                        </div>
                    </div>

                    <div class="bg-pink-50/20 rounded-xl p-2.5 text-[11px] border border-pink-50/50 flex flex-wrap gap-1">
                        <span class="text-slate-400 font-bold mr-1 shrink-0">PL:</span>
                        <div class="flex flex-wrap gap-1 flex-1">
                            <template x-for="char in stream.characters">
                                <button @click="openModal(char)" class="bg-white text-pink-700 hover:bg-pink-50 text-[10px] font-medium px-1.5 py-0.2 rounded-md cursor-pointer border border-pink-100 transition-colors">
                                    <span x-text="char.plName ? char.plName + '（' + char.pcName + '）' : char.pcName"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div class="hidden md:block bg-white rounded-2xl border border-pink-100 overflow-hidden shadow-xs">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[950px]">
                    <thead>
                        <tr class="bg-pink-50/30 border-b border-pink-100 text-xs font-bold text-slate-500 tracking-wider">
                            <th class="py-4 px-4 w-14 text-center">視聴</th>
                            <th class="py-4 px-4 w-28">配信日</th>
                            <th class="py-4 px-4 w-32">サムネイル</th>
                            <th class="py-4 px-4">シナリオ / システム</th>
                            <th class="py-4 px-4 w-36">GM</th>
                            <th class="py-4 px-4">PL (PC ※詳細表示)</th>
                            <th class="py-4 px-4 w-36 text-center">リンク</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-pink-50 text-sm">
                        <template x-for="stream in filteredStreams()" :key="'table-'+stream.id">
                            <tr class="hover:bg-pink-50/30 transition-colors" :class="isWatched(stream.id) ? 'bg-pink-50/15' : ''">
                                <td class="py-4 px-4 text-center">
                                    <input type="checkbox" :checked="isWatched(stream.id)" @change="toggleWatched(stream.id)" class="w-4 h-4 rounded border-pink-300 text-pink-500 focus:ring-pink-400 cursor-pointer accent-pink-500">
                                </td>
                                <td class="py-4 px-4 text-slate-400 font-semibold" x-text="stream.date"></td>
                                <td class="py-4 px-4">
                                    <template x-if="getYoutubeId(stream.links)">
                                        <div class="w-24 aspect-video bg-pink-50 rounded-lg overflow-hidden border border-pink-100/60 shadow-2xs transform hover:scale-105 transition-transform duration-200">
                                            <img :src="'https://img.youtube.com/vi/' + getYoutubeId(stream.links) + '/mqdefault.jpg'" alt="Thumbnail" class="w-full h-full object-cover">
                                        </div>
                                    </template>
                                    <template x-if="!getYoutubeId(stream.links)">
                                        <div class="w-24 aspect-video bg-pink-50/40 rounded-lg flex items-center justify-center border border-pink-100/30 text-[10px] text-pink-200 font-bold">
                                            NO IMAGE
                                        </div>
                                    </template>
                                </td>
                                <td class="py-4 px-4">
                                    <div class="font-bold text-slate-900 tracking-wide text-[15px] leading-snug" x-text="stream.scenario"></div>
                                    <span class="inline-block bg-slate-100 text-slate-500 text-xs px-2 py-0.5 rounded-md mt-2 font-medium" x-text="stream.system"></span>
                                </td>
                                <td class="py-4 px-4 font-bold text-slate-700" x-text="stream.gm"></td>
                                <td class="py-4 px-4">
                                    <div class="flex flex-wrap gap-1.5">
                                        <template x-for="char in stream.characters">
                                            <button @click="openModal(char)" class="bg-pink-50/50 text-pink-700 hover:bg-pink-100/60 text-xs font-medium px-2.5 py-1 rounded-xl cursor-pointer border border-pink-100/40 transition-colors">
                                                <span x-text="char.plName ? char.plName + '（' + char.pcName + '）' : char.pcName"></span>
                                            </button>
                                        </template>
                                    </div>
                                </td>
                                <td class="py-4 px-4 text-center">
                                    <div class="flex flex-col gap-1.5 max-w-[120px] mx-auto">
                                        <template x-for="link in stream.links">
                                            <a :href="link.url" target="_blank" class="inline-block w-full bg-pink-500 hover:bg-pink-600 text-white text-[11px] py-1 px-2 rounded-lg font-medium transition-colors shadow-xs tracking-wider" x-text="link.label"></a>
                                        </template>
                                        <template x-if="stream.hashtag">
                                            <a :href="'https://x.com/search?q=' + encodeURIComponent(stream.hashtag)" target="_blank" class="inline-block w-full bg-slate-700 hover:bg-slate-600 text-white text-[10px] py-0.5 px-2 rounded-lg font-normal transition-colors overflow-hidden text-ellipsis whitespace-nowrap" x-text="stream.hashtag"></a>
                                        </template>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <template x-if="filteredStreams().length === 0 && updatedAt !== '同期中...'">
            <div class="bg-white rounded-2xl border border-pink-100 p-12 text-center text-slate-400 font-medium shadow-xs">該当する配信データが見つかりません。</div>
        </template>

        <div x-show="modalOpen" x-transition class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/30 backdrop-blur-xs" @click.self="closeModal()" style="display: none;">
            <div class="bg-white rounded-2xl shadow-xl border border-pink-100 max-w-md w-full overflow-hidden transform transition-all">
                <div class="bg-slate-900 px-6 py-4 flex justify-between items-center text-white">
                    <h3 class="font-bold text-sm tracking-wider" x-text="selectedPc.pcName"></h3>
                    <button @click="closeModal()" class="text-white/60 hover:text-white text-2xl font-light transition-colors leading-none">&times;</button>
                </div>
                <div class="p-6 space-y-4 text-sm">
                    <div>
                        <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">プレイヤー (PL)</span>
                        <div class="text-slate-800 font-bold" x-text="selectedPc.plName || '未登録'"></div>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">プロフィール</span>
                        <div class="text-slate-700 bg-pink-50/20 p-3 rounded-xl whitespace-pre-wrap text-xs border border-pink-50/50 leading-relaxed" x-text="selectedPc.profile || '未登録'"></div>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">継続セッション数 / 履歴</span>
                        <div class="text-slate-600 text-xs font-medium" x-text="selectedPc.history || '未登録'"></div>
                    </div>
                    <template x-if="selectedPc.charasheetUrl">
                        <div class="pt-1">
                            <a :href="selectedPc.charasheetUrl" target="_blank" class="text-pink-500 hover:text-pink-600 font-bold text-xs inline-flex items-center gap-1 hover:underline">キャラクターシートを見る ↗</a>
                        </div>
                    </template>
                    <div class="pt-2 border-t border-pink-50">
                        <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">備考</span>
                        <div class="text-slate-500 text-xs whitespace-pre-wrap leading-relaxed" x-text="selectedPc.note || '-'"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function app() {
            return {
                updatedAt: "同期中...",
                streams: [],
                searchQuery: "",
                kosakaRole: "all",
                selectedStatus: "all",
                startDate: "",
                endDate: "",
                sortOrder: "desc",
                watchedIds: [],
                modalOpen: false,
                selectedPc: {},

                async initApp() {
                    const saved = localStorage.getItem('trpg_watched_ids');
                    if (saved) {
                        this.watchedIds = JSON.parse(saved);
                    }
                    
                    try {
                        const response = await fetch('https://na-nasika.github.io/ktrpg-fan-db/data.json');
                        if (!response.ok) throw new Error('データが見つかりません');
                        const data = await response.json();
                        
                        this.streams = data.streams;
                        this.updatedAt = data.updatedAt;
                    } catch (error) {
                        console.error("データの読み込みに失敗しました:", error);
                        this.updatedAt = "同期エラー";
                    }
                },

                getYoutubeId(links) {
                    if (!links || links.length === 0) return null;
                    
                    const ytLink = links.find(l => l.url && (l.url.includes('youtube.com') || l.url.includes('youtu.be')));
                    if (!ytLink || !ytLink.url) return null;

                    const url = ytLink.url.trim();
                    
                    if (url.includes('watch?v=')) {
                        const parts = url.split('v=');
                        if (parts[1]) return parts[1].split('&')[0];
                    }
                    
                    const pathTypes = ['/live/', '/shorts/', '/embed/'];
                    for (const type of pathTypes) {
                        if (url.includes(type)) {
                            const parts = url.split(type);
                            if (parts[1]) return parts[1].split('?')[0].split('&')[0];
                        }
                    }
                    
                    if (url.includes('youtu.be/')) {
                        const parts = url.split('youtu.be/');
                        if (parts[1]) return parts[1].split('?')[0].split('&')[0];
                    }

                    return null;
                },

                toggleRole(role) {
                    if (this.kosakaRole === role) {
                        this.kosakaRole = "all";
                    } else {
                        this.kosakaRole = role;
                    }
                },

                toggleStatus(status) {
                    if (this.selectedStatus === status) {
                        this.selectedStatus = "all";
                    } else {
                        this.selectedStatus = status;
                    }
                },

                toggleSortOrder() {
                    this.sortOrder = this.sortOrder === 'desc' ? 'asc' : 'desc';
                },

                filteredStreams() {
                    let result = this.streams.filter(stream => {
                        const query = this.searchQuery.toLowerCase();
                        const matchQuery = !query || 
                            stream.scenario.toLowerCase().includes(query) ||
                            stream.system.toLowerCase().includes(query) ||
                            stream.gm.toLowerCase().includes(query) ||
                            (stream.hashtag && stream.hashtag.toLowerCase().includes(query)) ||
                            stream.characters.some(c => 
                                (c.pcName && c.pcName.toLowerCase().includes(query)) || 
                                (c.plName && c.plName.toLowerCase().includes(query))
                            );

                        let matchKosaka = true;
                        if (this.kosakaRole === 'gm') {
                            matchKosaka = stream.gm.includes('コーサカ');
                        } else if (this.kosakaRole === 'pl') {
                            matchKosaka = stream.characters.some(c => c.plName && c.plName.includes('コーサカ'));
                        }

                        let matchDate = true;
                        const streamDateStr = stream.date.replace(/\//g, '-');
                        if (this.startDate && streamDateStr < this.startDate) matchDate = false;
                        if (this.endDate && streamDateStr > this.endDate) matchDate = false;
                        
                        let matchStatus = true;
                        const watched = this.isWatched(stream.id);
                        if (this.selectedStatus === 'watched') matchStatus = watched;
                        if (this.selectedStatus === 'unwatched') matchStatus = !watched;

                        return matchQuery && matchKosaka && matchDate && matchStatus;
                    });

                    return result.sort((a, b) => {
                        const dateA = new Date(a.date);
                        const dateB = new Date(b.date);
                        return this.sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
                    });
                },

                isWatched(id) {
                    return this.watchedIds.includes(id);
                },

                toggleWatched(id) {
                    if (this.isWatched(id)) {
                        this.watchedIds = this.watchedIds.filter(wId => wId !== id);
                    } else {
                        this.watchedIds.push(id);
                    }
                    localStorage.setItem('trpg_watched_ids', JSON.stringify(this.watchedIds));
                },

                openModal(charData) {
                    this.selectedPc = charData;
                    this.modalOpen = true;
                },

                closeModal() {
                    this.modalOpen = false;
                    this.selectedPc = {};
                }
            }
        }
    </script>
</body>
</html>
